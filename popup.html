<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pakistan Top Universities</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="popup-container">
    <header class="header">
      <h1>Pakistan Top Universities</h1>
      <p>Top 25 institutes at a glance</p>
    </header>

    <section class="search-section">
      <input
        type="text"
        id="searchInput"
        placeholder="Search by university name..."
        aria-label="Search universities"
      />
    </section>

    <section id="universityList" class="university-list" aria-live="polite"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
